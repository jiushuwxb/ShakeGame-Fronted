<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>希捷活动落地页</title>
    <link rel="stylesheet" href="./index.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-mask"></div>
        <div class="hero-bottom-fade"></div>

        <div class="hero-content">
          <header class="brand-row" aria-label="Seagate">
            <img src="./assets/logo.png" alt="希捷logo" class="brand-logo">
          </header>

          <section class="headline">
            <h1>大容远致<br>智启视听新境</h1>
            <p>Mass Capacity, Smart Media Future</p>
          </section>

          <section class="products" aria-label="产品展示">
            <img class="product-card product-left" src="./assets/prod1.png" alt="希捷产品图 1">
            <img class="product-card product-center" src="./assets/prod2.png" alt="希捷产品图 2">
            <img class="product-card product-right" src="./assets/prod3.png" alt="希捷产品图 3">
          </section>

          <div class="start-button is-locked" role="button" aria-disabled="true" tabindex="-1">
            <img src="./assets/button.png" alt="开始按钮" class="start-button-icon">
          </div>
        </div>
      </section>
    </main>
    <script src="./config.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
